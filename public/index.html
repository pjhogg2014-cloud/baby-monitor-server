<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Monitor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
  h1   { color: #2c3e50; margin-bottom: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .value { font-size: 48px; font-weight: bold; color: #2c3e50; }
  .label { font-size: 13px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
  .alert { background: #fff5f5; border-left: 4px solid #e74c3c; padding: 10px 14px;
           border-radius: 0 8px 8px 0; margin-bottom: 8px; font-size: 13px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block;
                background: #2ecc71; margin-right: 6px; }
  .offline { background: #e74c3c; }
  #audioBtn { background: #3498db; color: white; border: none; padding: 10px 20px;
              border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<h1>🍼 Baby Monitor</h1>
<p><span class="status-dot" id="dot"></span><span id="status">Connecting...</span></p>

<div class="grid">
  <div class="card">
    <div class="label">Temperature</div>
    <div class="value" id="temp">--</div>
    <div style="font-size:13px;color:#7f8c8d">°C object / ambient</div>
    <canvas id="tempChart" height="80"></canvas>
  </div>
  <div class="card">
    <div class="label">Breathing Rate</div>
    <div class="value" id="br">--</div>
    <div style="font-size:13px;color:#7f8c8d">breaths per minute</div>
    <canvas id="brChart" height="80"></canvas>
  </div>
  <div class="card">
    <div class="label">Heart Rate</div>
    <div class="value" id="hr">--</div>
    <div style="font-size:13px;color:#7f8c8d">beats per minute</div>
    <canvas id="hrChart" height="80"></canvas>
  </div>
  <div class="card">
    <div class="label">Audio</div>
    <button id="audioBtn" onclick="startAudio()">▶ Start Listening</button>
    <canvas id="audioChart" height="80"></canvas>
  </div>
</div>

<div class="card" style="margin-top:16px">
  <div class="label">Alert History</div>
  <div id="alerts"><p style="color:#aaa">No alerts yet.</p></div>
</div>

<script>
// ---- Chart setup ----
function makeChart(id, label, colour) {
    return new Chart(document.getElementById(id), {
        type: 'line',
        data: {
            labels: [],
            datasets: [{ label, data: [], borderColor: colour,
                         borderWidth: 2, pointRadius: 0, tension: 0.3,
                         fill: false }]
        },
        options: { animation: false, scales: {
            x: { display: false }, y: { display: true }
        }, plugins: { legend: { display: false } } }
    });
}

const tempChart = makeChart('tempChart', 'Temp', '#e74c3c');
const brChart   = makeChart('brChart',   'BR',   '#3498db');
const hrChart   = makeChart('hrChart',   'HR',   '#2ecc71');

function addPoint(chart, value) {
    const now = new Date().toLocaleTimeString();
    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(value);
    if (chart.data.labels.length > 60) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }
    chart.update();
}

// ---- WebSocket to server ----
const ws = new WebSocket('wss://baby-monitor-server-0st8.onrender.com');

ws.onopen = () => {
    document.getElementById('status').textContent = 'Connected';
    document.getElementById('dot').classList.remove('offline');
};
ws.onclose = () => {
    document.getElementById('status').textContent = 'Disconnected — refresh to reconnect';
    document.getElementById('dot').classList.add('offline');
};

ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'sensor') {
        if (msg.topic === 'babymonitor/temperature') {
            document.getElementById('temp').textContent =
                msg.data.object.toFixed(1);
            addPoint(tempChart, msg.data.object);
        }
        if (msg.topic === 'babymonitor/breathing') {
            document.getElementById('br').textContent =
                msg.data.breathing.toFixed(0);
            document.getElementById('hr').textContent =
                msg.data.heartrate.toFixed(0);
            addPoint(brChart, msg.data.breathing);
            addPoint(hrChart, msg.data.heartrate);
        }
        if (msg.topic === 'babymonitor/alerts') {
            const div = document.getElementById('alerts');
            const el = document.createElement('div');
            el.className = 'alert';
            el.textContent = `${new Date().toLocaleTimeString()} — ${msg.data.condition}`;
            div.prepend(el);
        }
    }

    if (msg.type === 'audio') {
        // Render waveform on audio chart
        const samples = msg.data.slice(0, 50);
        audioChart.data.labels = samples.map((_, i) => i);
        audioChart.data.datasets[0].data = samples;
        audioChart.update();
    }
};

// ---- Audio playback ----
let audioCtx, audioQueue = [];

function startAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)
        ({ sampleRate: 16000 });
    document.getElementById('audioBtn').textContent = '🔊 Listening...';
}

const audioChart = makeChart('audioChart', 'Waveform', '#9b59b6');
</script>
</body>
</html>
