<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Vital Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1923; color: #e8edf2; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; font-size: 1.4rem; color: #7ecfff; letter-spacing: 0.05em; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .card { background: #1a2635; border-radius: 10px; padding: 16px 14px 14px; text-align: center; border: 1px solid #263545; }
  .card .label { font-size: 0.75rem; color: #7a9bb5; text-transform: uppercase; letter-spacing: 0.08em; }
  .card .value { font-size: 2rem; font-weight: 700; margin: 6px 0 2px; color: #e8edf2; }
  .card .unit  { font-size: 0.7rem; color: #5a7a95; }
  .card.alert-active { border-color: #e74c3c; background: #2a1a1a; }
  .card.alert-active .value { color: #e74c3c; }
  .media-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 640px) { .media-row { grid-template-columns: 1fr; } }
  .panel { background: #1a2635; border-radius: 10px; border: 1px solid #263545; overflow: hidden; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; font-size: 0.8rem; color: #7a9bb5; border-bottom: 1px solid #263545; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #2c3e50; display: inline-block; margin-right: 6px; }
  .dot.connected { background: #2ecc71; }
  .dot.error     { background: #e74c3c; }
  #videoFeed { width: 100%; display: block; background: #0a1018; aspect-ratio: 4/3; object-fit: contain; }
  .audio-panel { padding: 14px; }
  .audio-vis { width: 100%; height: 60px; background: #0f1923; border-radius: 6px; margin-bottom: 10px; }
  #audioToggle { width: 100%; padding: 8px; background: #7ecfff; color: #0f1923; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
  #audioToggle:hover { background: #5bbff0; }
  #audioToggle.muted { background: #2c3e50; color: #7a9bb5; }
  .alerts-panel { background: #1a2635; border-radius: 10px; border: 1px solid #263545; overflow: hidden; margin-bottom: 20px; }
  .alerts-header { padding: 10px 14px; font-size: 0.8rem; color: #7a9bb5; border-bottom: 1px solid #263545; }
  #alertList { list-style: none; max-height: 160px; overflow-y: auto; padding: 0; }
  #alertList li { padding: 8px 14px; font-size: 0.8rem; border-bottom: 1px solid #152030; color: #e8edf2; }
  #alertList li:first-child { color: #e74c3c; font-weight: 600; }
  .ts { color: #5a7a95; margin-right: 8px; font-size: 0.75rem; }
  .status-bar { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.72rem; color: #5a7a95; justify-content: center; }
  .status-bar span { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<h1>🍼 Baby Vital Monitor</h1>

<div class="grid">
  <div class="card" id="card-temp">
    <div class="label">Temperature</div>
    <div class="value" id="val-temp">--.-</div>
    <div class="unit">°C</div>
  </div>
  <div class="card" id="card-br">
    <div class="label">Breathing Rate</div>
    <div class="value" id="val-br">--</div>
    <div class="unit">breaths / min</div>
  </div>
  <div class="card" id="card-hr">
    <div class="label">Heart Rate</div>
    <div class="value" id="val-hr">--</div>
    <div class="unit">beats / min</div>
  </div>
  <div class="card" id="card-dist">
    <div class="label">Radar Distance</div>
    <div class="value" id="val-dist">--.-</div>
    <div class="unit">cm</div>
  </div>
</div>

<div class="media-row">
  <div class="panel">
    <div class="panel-header">
      <span><span class="dot" id="vidDot"></span>Camera</span>
      <span id="vidStatus">connecting…</span>
    </div>
    <img id="videoFeed" alt="Camera feed" />
  </div>
  <div class="panel">
    <div class="panel-header">
      <span><span class="dot" id="audDot"></span>Microphone</span>
      <span id="audStatus">connecting…</span>
    </div>
    <div class="audio-panel">
      <!-- Oscilloscope waveform — draws one pixel per sample so any
           non-zero signal is visible regardless of amplitude or frame size -->
      <canvas class="audio-vis" id="audioCanvas"></canvas>

      <!-- Raw debug row: confirms data is arriving and shows signal level.
           Frames=0 means no data reaching browser.
           Peak=0% means data arriving but signal is silent.
           Both non-zero but no sound means AudioContext issue. -->
      <div style="display:flex;gap:14px;padding:5px 2px 8px;font-size:0.7rem;
                  color:#5a7a95;font-family:monospace;">
        <span>Frames: <b id="dbgFrames" style="color:#7ecfff">0</b></span>
        <span>Samples: <b id="dbgSamples" style="color:#7ecfff">--</b></span>
        <span>Peak: <b id="dbgPeak" style="color:#7ecfff">--%</b></span>
        <span>RMS: <b id="dbgRms" style="color:#7ecfff">-- dB</b></span>
      </div>

      <button id="audioToggle" onclick="toggleAudio()">🔊 Click to enable audio</button>
    </div>
  </div>
</div>

<div class="alerts-panel">
  <div class="alerts-header">⚠ Alert Feed</div>
  <ul id="alertList">
    <li style="color:#5a7a95;padding:10px 14px;font-size:0.8rem;">No alerts yet.</li>
  </ul>
</div>

<div class="status-bar">
  <span><span class="dot" id="mqttDot"></span>MQTT Dashboard</span>
  <span><span class="dot" id="audioDot2"></span>Audio Stream</span>
  <span><span class="dot" id="videoDot2"></span>Video Stream</span>
</div>

<script>
const SERVER = 'wss://baby-monitor-server-0st8.onrender.com';

// DASHBOARD WebSocket — receives JSON sensor messages from server.
let dashWs = null;

function connectDash() 
    {
    dashWs = new WebSocket(SERVER + '/dashboard');
    dashWs.onopen  = () => setDot('mqttDot', 'connected');
    dashWs.onclose = () => { setDot('mqttDot', ''); setTimeout(connectDash, 4000); };
    dashWs.onmessage = (e) => {
        // Guard: ignore any stray binary frames (should not arrive after Bug 4 fix)
        if (e.data instanceof ArrayBuffer || e.data instanceof Blob) return;

        try {
            const msg = JSON.parse(e.data);

            // ── Initial state snapshot sent on connect ───────────
            if (msg.type === 'state' && msg.data) {
                const s = msg.data;
                if (s.temperature && s.temperature.object !== undefined)
                    updateTemp(s.temperature.object);
                if (s.breathing != null)
                    document.getElementById('val-br').textContent = Math.round(s.breathing);
                if (s.heartrate != null)
                    document.getElementById('val-hr').textContent = Math.round(s.heartrate);
                if (s.alerts && s.alerts.length)
                    s.alerts.slice().reverse().forEach(a => addAlert(a.condition, a.ts));
                return;
            }

            // ── Live MQTT sensor message ─────────────────────────
            // Unwrap the { type, topic, data } envelope first,
            // then read fields from data (not the top-level msg).
            if (msg.type === 'sensor' && msg.data) {
                const d     = msg.data;
                const topic = msg.topic || '';

                if (topic === 'babymonitor/temperature' && d.object !== undefined)
                    updateTemp(d.object);

                if (topic === 'babymonitor/radar') {
                    if (d.breathing !== undefined)
                        document.getElementById('val-br').textContent = Math.round(d.breathing);
                    if (d.heartrate !== undefined)
                        document.getElementById('val-hr').textContent = Math.round(d.heartrate);
                    if (d.distance !== undefined)
                        document.getElementById('val-dist').textContent = parseFloat(d.distance).toFixed(2);
                }

                if (topic === 'babymonitor/alerts' && d.condition)
                    addAlert(d.condition, d.ts);
            }

        } catch (err) { /* non-JSON — ignore */ }
    };
}

function updateTemp(t) {
    document.getElementById('val-temp').textContent = parseFloat(t).toFixed(1);
    document.getElementById('card-temp').classList.toggle('alert-active', t >= 38.0 || t < 34.0);
}

function addAlert(condition, ts) {
    if (!condition) return;
    const list = document.getElementById('alertList');
    if (list.children.length === 1 && list.children[0].style.color === 'rgb(90, 122, 149)')
        list.innerHTML = '';
    const li = document.createElement('li');
    const time = ts ? new Date(ts * 1000).toLocaleTimeString() : new Date().toLocaleTimeString();
    li.innerHTML = `<span class="ts">${time}</span>${condition}`;
    list.prepend(li);
    while (list.children.length > 20) list.removeChild(list.lastChild);
}

// ================================================================
// VIDEO WebSocket
// ================================================================
let videoWs  = null;
const videoImg = document.getElementById('videoFeed');

function connectVideo() {
    videoWs = new WebSocket(SERVER + '/video');
    videoWs.binaryType = 'arraybuffer';
    videoWs.onopen = () => {
        setDot('vidDot', 'connected'); setDot('videoDot2', 'connected');
        document.getElementById('vidStatus').textContent = 'live';
    };
    videoWs.onclose = () => {
        setDot('vidDot', 'error'); setDot('videoDot2', '');
        document.getElementById('vidStatus').textContent = 'reconnecting…';
        setTimeout(connectVideo, 4000);
    };
    videoWs.onmessage = (event) => {
        const prev = videoImg.src;
        videoImg.src = URL.createObjectURL(new Blob([event.data], { type: 'image/jpeg' }));
        if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
    };
}

// ================================================================
// AUDIO WebSocket — oscilloscope waveform + raw debug display
//
// JUSTIFICATION FOR EACH CHANGE:
//
// 1. Bar graph → oscilloscope waveform:
//    The bar graph averaged 512 samples into 48 buckets. If a frame
//    is smaller than 48 samples, chunk = floor(n/48) = 0 and bars
//    never update regardless of signal. The oscilloscope maps every
//    sample to a canvas column using linear interpolation, so ANY
//    non-zero frame produces a visible trace.
//
// 2. Raw debug row (Frames / Samples / Peak / RMS):
//    These four values confirm exactly where in the pipeline audio
//    is failing. If Frames stays 0, data never reaches the browser.
//    If Frames increments but Peak is 0%, frames are arriving empty.
//    If Peak is non-zero but waveform is flat, the canvas draw loop
//    is broken. This eliminates guesswork.
//
// 3. audioMuted starts true; first button click unmutes via resume():
//    Previously audioMuted started false but audioCtx was null, so
//    the mute check (audioMuted || !audioCtx) blocked playback even
//    though the flag said unmuted. Now audioMuted=true makes the
//    initial state honest. The first button click creates the
//    AudioContext AND calls resume() via Promise to guarantee the
//    context is in 'running' state before any frame is scheduled.
//    Chrome sometimes returns 'suspended' even on a fresh context
//    created inside a click handler; the .then() callback ensures
//    audioMuted is only set to false after resume succeeds.
//
// 4. Waveform draws regardless of mute state:
//    The visualiser should always show the live signal so the user
//    can confirm the mic is working before enabling audio output.
// ================================================================
let audioWs      = null;
let audioCtx     = null;
let nextPlayTime = 0;
let audioMuted   = true;    // true until user clicks button

const canvas    = document.getElementById('audioCanvas');
const canvasCtx = canvas.getContext('2d');

// Rolling sample buffer — resized to match canvas width on first draw
let waveBuffer = new Float32Array(512);
let frameCount = 0;

function drawWaveform() {
    requestAnimationFrame(drawWaveform);
    const W = canvas.clientWidth, H = canvas.clientHeight;
    if (canvas.width !== W || canvas.height !== H) {
        canvas.width  = W;
        canvas.height = H;
        waveBuffer    = new Float32Array(W);
    }

    // Background
    canvasCtx.fillStyle = '#0f1923';
    canvasCtx.fillRect(0, 0, W, H);

    // Centre line
    canvasCtx.strokeStyle = '#1e3045';
    canvasCtx.lineWidth   = 1;
    canvasCtx.beginPath();
    canvasCtx.moveTo(0, H / 2);
    canvasCtx.lineTo(W, H / 2);
    canvasCtx.stroke();

    // Waveform trace — colour changes to grey when muted
    canvasCtx.strokeStyle = audioMuted ? '#2c3e50' : '#7ecfff';
    canvasCtx.lineWidth   = 1.5;
    canvasCtx.beginPath();
    for (let x = 0; x < W; x++) {
        const y = (H / 2) - (waveBuffer[x] * H * 0.45);
        x === 0 ? canvasCtx.moveTo(x, y) : canvasCtx.lineTo(x, y);
    }
    canvasCtx.stroke();
}
drawWaveform();

function playAudioFrame(arrayBuffer) {
    const int16 = new Int16Array(arrayBuffer);
    if (int16.length === 0) return;

    frameCount++;

    // Convert to Float32 and apply 4× gain.
    // The INMP441 signal after the >> 8 firmware shift is typically
    // 5–15% of full scale. Without gain the waveform is invisible
    // and audio is inaudible. Clamp to [-1, 1] to prevent clipping.
    let peak = 0, sumSq = 0;
    const amp = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
        const s = Math.max(-1, Math.min(1, (int16[i] * 4) / 32768));
        amp[i]  = s;
        if (Math.abs(s) > peak) peak = Math.abs(s);
        sumSq += s * s;
    }
    const rmsDb = 20 * Math.log10(Math.sqrt(sumSq / int16.length) + 1e-10);

    // ── Raw debug display (always updated, mute-independent) ──────
    document.getElementById('dbgFrames').textContent  = frameCount;
    document.getElementById('dbgSamples').textContent = int16.length;
    document.getElementById('dbgPeak').textContent    = (peak * 100).toFixed(1) + '%';
    document.getElementById('dbgRms').textContent     = rmsDb.toFixed(1) + ' dB';

    // ── Oscilloscope waveform (always updated) ────────────────────
    const W = waveBuffer.length;
    for (let x = 0; x < W; x++) {
        waveBuffer[x] = amp[Math.floor((x / W) * amp.length)];
    }

    // ── Audio playback (only when unmuted and context running) ────
    if (audioMuted || !audioCtx || audioCtx.state !== 'running') return;

    const buf = audioCtx.createBuffer(1, amp.length, 16000);
    buf.copyToChannel(amp, 0);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (nextPlayTime < now + 0.01) nextPlayTime = now + 0.05;
    src.start(nextPlayTime);
    nextPlayTime += buf.duration;
}

function connectAudio() {
    audioWs = new WebSocket(SERVER + '/audio');
    audioWs.binaryType = 'arraybuffer';
    audioWs.onopen = () => {
        setDot('audDot', 'connected'); setDot('audioDot2', 'connected');
        document.getElementById('audStatus').textContent = 'live';
    };
    audioWs.onclose = () => {
        setDot('audDot', 'error'); setDot('audioDot2', '');
        document.getElementById('audStatus').textContent = 'reconnecting…';
        setTimeout(connectAudio, 4000);
    };
    audioWs.onmessage = (event) => playAudioFrame(event.data);
}

function toggleAudio() {
    const btn = document.getElementById('audioToggle');
    if (!audioCtx) {
        // First click: create AudioContext inside a user gesture handler.
        // The browser requires this — AudioContexts created outside a
        // gesture are immediately suspended and cannot produce sound.
        // resume() returns a Promise; we only set audioMuted=false after
        // the Promise resolves to guarantee the context is in 'running'
        // state before any frame tries to schedule playback.
        audioCtx = new (window.AudioContext || window.webkitAudioContext)
                       ({ sampleRate: 16000 });
        audioCtx.resume().then(() => {
            audioMuted   = false;
            nextPlayTime = 0;
            btn.textContent = '🔇 Mute';
            btn.classList.remove('muted');
        });
    } else {
        audioMuted = !audioMuted;
        if (!audioMuted) audioCtx.resume();
        btn.textContent = audioMuted ? '🔊 Unmute' : '🔇 Mute';
        btn.classList.toggle('muted', audioMuted);
    }
}

function setDot(id, state) {
    document.getElementById(id).className = 'dot' + (state ? ' ' + state : '');
}

connectDash();
connectVideo();
connectAudio();
</script>
</body>
</html>
